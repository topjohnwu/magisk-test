name: Magisk Test

on:
  workflow_dispatch:

jobs:
  cf_test:
    name: Test on AOSP main Cuttlefish
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Cuttlefish
        run: scripts/cf_setup.sh setup

      - name: Run Cuttlefish
        run: su $USER -c 'scripts/cf_setup.sh run'

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cvd-logs"
          path: |
            /home/runner/aosp_cf_x86_64_phone/cuttlefish/instances/cvd-1/logs
            /home/runner/aosp_cf_x86_64_phone/cuttlefish/instances/cvd-1/cuttlefish_config.json
